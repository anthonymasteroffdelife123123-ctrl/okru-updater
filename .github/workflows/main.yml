name: Update URLs

on:
  push:
    branches:
      - main
    paths:
      - 'urls.txt'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    # ✅ Permiso explícito para que el workflow pueda hacer push al repositorio
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install yt-dlp
      run: pip install yt-dlp
    
    - name: Run extractor
      run: python extractor.py
    
    - name: Commit and push
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add urls_frescas.txt
        git diff --staged --quiet || git commit -m "🔄 Actualización automática de URLs"
        git push
